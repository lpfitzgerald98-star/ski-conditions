# Daily static snapshot for the ski-conditions map, published to GitHub Pages.
#
# Once a day it ingests every station, scores the roster (forecasts included), and
# writes web/data/*.json, then publishes web/ to Pages. No server runs between
# builds -- this IS the site's "live" data, refreshed on the cron below.
#
# One-time setup by the repo owner: Settings -> Pages -> Source: "GitHub Actions".
# Manual refresh anytime: Actions tab -> this workflow -> "Run workflow".

name: Ski snapshot

on:
  schedule:
    - cron: "0 13 * * *"      # 13:00 UTC daily (~morning in North America)
  workflow_dispatch:           # allow manual runs
  push:
    branches: [main]           # rebuild when the site or scoring changes

# contents:write lets the job commit newly-settled history dates back to the repo
# (the retrospective history is immutable + append-only; persisting it means each
# run only computes the few new dates instead of the whole season).
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ski-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pandas numpy requests anthropic

      - name: Build snapshot + retrospective history (ingest + score)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/build_snapshot.py --history

      - name: Persist new history dates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/hist
          git diff --cached --quiet || git commit -m "History: new retrospective dates [skip ci]"
          git push || true

      - uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
